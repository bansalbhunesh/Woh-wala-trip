name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      NEXT_PUBLIC_POSTHOG_KEY: placeholder
      NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
      NEXT_PUBLIC_SITE_URL: https://placeholder.yaarlore.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  ai-worker:
    name: AI Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker
    env:
      ANTHROPIC_API_KEY: sk-ant-placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key_here
      AI_WORKER_SECRET: placeholder_secret_32_chars_minimum
      AI_WORKER_HMAC_SECRET: placeholder_hmac_secret_32_chars_ok
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-worker/pyproject.toml
      - run: pip install -e ".[test]"
      - run: python -X utf8 -m tests.run_deterministic
      - run: python -m pytest tests/test_schema.py tests/test_safety.py -v --tb=short

  docker:
    name: AI Worker Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./ai-worker
          push: false
          tags: yaarlore-ai-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true
