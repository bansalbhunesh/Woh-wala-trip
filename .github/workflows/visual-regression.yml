name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.tsx'
      - 'src/**/*.css'
      - 'src/app/globals.css'
      - 'tailwind.config.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic Visual Regression
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Storybook
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        run: npx storybook build --output-dir storybook-static
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
      - name: Run Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
          exitOnceUploaded: ${{ github.event_name == 'push' }}
          onlyChanged: true
          traceChanged: true

  playwright-visual:
    name: Playwright Screenshot Regression
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}
      - name: Run visual regression snapshots
        run: npx playwright test tests/e2e/visual-regression.spec.ts --project=chromium --update-snapshots
      - name: Commit & Push Baseline Snapshots if updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual-regression.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No changes in visual snapshots."
          else
            git commit -m "chore: auto-update visual regression baseline snapshots [skip ci]"
            git push
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-visual-diff
          path: playwright-report/
          retention-days: 14
