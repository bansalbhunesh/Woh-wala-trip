[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test
python_functions = test_
asyncio_mode = auto
log_cli = true
log_cli_level = INFO

# Markers
markers =
    llm: marks tests that call the LLM evaluator (slower, costs tokens)
    fast: marks tests that are purely deterministic (no LLM call)
    schema: schema compliance tests
    safety: toxicity/bias/PII tests
    quality: narrative quality tests
    signals: signal faithfulness tests
    archetypes: character role tests
    calibration: chaos score calibration tests
    battle: battle judgment tests
    anniversary: anniversary email tests
    integration: end-to-end pipeline tests

# Skip LLM tests by default in CI unless DEEPEVAL_LLM_TESTS=1 is set
# Run: pytest -m "not llm" for fast tests only
# Run: pytest -m "llm" for full LLM evaluation suite
